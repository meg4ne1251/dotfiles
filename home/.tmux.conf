# ~/.tmux.conf

# --- Prefix: Ctrl+g ---------------------------------------------------------
unbind C-b
set -g prefix C-g
bind C-g send-prefix

# --- General ----------------------------------------------------------------
set -g mouse on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"   # True color
set -g history-limit 50000
set -sg escape-time 10
set -g focus-events on
set -g display-time 1500
setw -g mode-keys vi

# Number windows/panes from 1 and renumber when one closes.
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- Splits keep the current path -------------------------------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# --- Pane navigation (hjkl) and resize (HJKL) -------------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Shift+arrows: move between panes without the prefix.
bind -n S-Left  select-pane -L
bind -n S-Down  select-pane -D
bind -n S-Up    select-pane -U
bind -n S-Right select-pane -R

# Ctrl+arrows: move between windows without the prefix.
bind -n C-Left  previous-window
bind -n C-Right next-window

# --- vi-style copy mode -----------------------------------------------------
bind -T copy-mode-vi v     send -X begin-selection
bind -T copy-mode-vi y     send -X copy-pipe-and-cancel "xclip -selection clipboard -i"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "xclip -selection clipboard -i"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "xclip -selection clipboard -i"

# --- Reload config in place -------------------------------------------------
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# --- Status bar -------------------------------------------------------------
set -g status-interval 5
set -g status-justify left
set -g status-style "bg=colour235,fg=colour250"
set -g status-left "#[fg=colour235,bg=colour40,bold] #S #[default] "
set -g status-left-length 30
set -g status-right "#[fg=colour250]#H #[fg=colour245]%Y-%m-%d %H:%M "
set -g status-right-length 60
setw -g window-status-current-style "fg=colour235,bg=colour39,bold"
setw -g window-status-current-format " #I:#W "
setw -g window-status-format " #I:#W "
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour39"
